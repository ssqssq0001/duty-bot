name: 每日值班提醒机器人

on:
  schedule:
    - cron: '0 4 * * *'  # 每天 北京时间 12:00 运行
  workflow_dispatch:    # 允许手动点击运行

jobs:
  send-duty:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行值班脚本
        run: python duty.py
