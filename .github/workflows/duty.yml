name: Daily Duty Reminder

on:
  schedule:
    # UTC 4:00 = 北京时间 12:00
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python duty.py
